    - "# ═══════════════════════════════════════"
    - "#  📡 StreamFlex Pvt"
    - "#  🕐 Last Updated : {{lastUpdated}}"
    - "#  💬 Support TG      : t.me/StreamFlex19"
    - "#  ⚠️ Use only authorized streams."
    - "# ═══════════════════════════════════════"

channels:
  - name: "Example Channel HD"
    groupTitle: "Entertainment"
    tvgLogo: "https://example.com/logo.png"
    url: "https://example.com/live/manifest.mpd"
    vlcUserAgent: "MyPlayer/1.0"
    kodiProps:
      - "inputstream.adaptive.license_type=clearkey"
    extHttp: "{\"header\":\"value\"}"
